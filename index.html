<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feliz Cumpleaños Korina</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<audio id="bgMusic" loop>
    <source src="just-the-way-you-are.mp3" type="audio/mpeg">
</audio>

<div id="particles"></div>

<!-- BOTÓN MUSICA -->
<button id="musicBtn" onclick="toggleMusic()">🎵 Música</button>

<!-- PANTALLA 1 -->
<section id="pantalla1" class="screen active">
    <div class="card">
        <h1>✨ Hola, Korina</h1>
        <p>Antes de continuar tengo un regalo para ti 🎁</p>

        <button onclick="iniciarExperiencia()">
            Abrir regalo
        </button>
    </div>
</section>

<!-- PANTALLA 2: MENSAJE -->
<section id="pantalla2" class="screen">
    <div class="card">
        <h2>🎂 Feliz Cumpleaños</h2>

        <p id="mensajeInicial">
            Hoy es un día especial...
        </p>

        <button onclick="nextScreen(3)">
            Ver sorpresa 🐶
        </button>
    </div>
</section>

<!-- PANTALLA 3: PERRITO -->
<section id="pantalla3" class="screen">

    <div class="card">
        <h2>🐶 Perrito de la suerte</h2>

        <video width="260" autoplay loop muted playsinline>
            <source src="perrito.mp4" type="video/mp4">
        </video>

        <p>
            Este es el perrito de la suerte, la alegría y las buenas vibras ✨
        </p>

        <button onclick="nextScreen(4)">
            Abrir cajita 🎁
        </button>
    </div>

</section>

<!-- PANTALLA 4: MENSAJES ALEATORIOS -->
<section id="pantalla4" class="screen">

    <div class="card">

        <h2>🎁 Cajita de regalos</h2>

        <p id="mensajeAleatorio">
            Haz clic para abrir un mensaje
        </p>

        <button onclick="nuevoMensaje()">
            Abrir 🎁
        </button>

        <button onclick="finalCumple()">
            Finalizar 🎉
        </button>

    </div>

</section>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script src="script.js"></script>

</body>
</html>
